<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Emma cumple 2</title>

<style>

body{
    text-align:center;
    font-family: Arial;
    background:white;
    color:black;
    overflow:hidden;
}

h1{
    font-size:70px;
    color:red;
    animation: zoom 2s infinite alternate;
}

@keyframes zoom{
    from{transform:scale(1)}
    to{transform:scale(1.1)}
}

#countdown{
    font-size:40px;
    margin-top:20px;
}


/* globos */

.balloon{
    position:absolute;
    bottom:-100px;
    width:60px;
    animation: float 12s infinite;
}

@keyframes float{
    from{bottom:-100px}
    to{bottom:110%}
}


/* personajes */

.character{
    position:absolute;
    width:140px;
    animation: move 8s infinite;
}

@keyframes move{
    0%{left:-150px; opacity:0}
    30%{opacity:1}
    70%{opacity:1}
    100%{left:110%; opacity:0}
}

</style>

</head>

<body>

<h1>🎤 EMMA CUMPLE 2 🎤</h1>

<p>Te invitamos a celebrar con nosotros</p>

<p>
📅 11 Abril 2026<br>
⏰ 15:30<br>
📍 Cerro Lila 6200 Casa 13 Peñalolén
</p>

<div id="countdown"></div>


<!-- MUSICA -->

<audio autoplay loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3">
</audio>



<!-- GLOBOS -->

<img class="balloon" style="left:10%" 
src="https://upload.wikimedia.org/wikipedia/commons/3/3f/Balloon_red.svg">

<img class="balloon" style="left:40%" 
src="https://upload.wikimedia.org/wikipedia/commons/6/6b/Balloon_blue.svg">

<img class="balloon" style="left:70%" 
src="https://upload.wikimedia.org/wikipedia/commons/3/3c/Balloon_yellow.svg">



<!-- PERSONAJES (estilo caricatura música) -->

<img class="character" style="top:20%" 
src="https://upload.wikimedia.org/wikipedia/commons/7/70/Music_Notes.svg">

<img class="character" style="top:50%" 
src="https://upload.wikimedia.org/wikipedia/commons/4/4f/Microphone_icon.svg">

<img class="character" style="top:70%" 
src="https://upload.wikimedia.org/wikipedia/commons/0/02/Star_icon-72a7cf.svg">



<script>

var countDownDate = new Date("Apr 11, 2026 15:30:00").getTime();

var x = setInterval(function() {

var now = new Date().getTime();

var distance = countDownDate - now;

var days = Math.floor(distance / (1000 * 60 * 60 * 24));

var hours = Math.floor((distance % (1000*60*60*24)) / (1000*60*60));

var minutes = Math.floor((distance % (1000*60*60)) / (1000*60));

document.getElementById("countdown").innerHTML =
"Faltan " + days + " días " + hours + " horas " + minutes + " min";

}, 1000);

</script>

</body>
</html>

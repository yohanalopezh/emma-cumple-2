<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Emma cumple 2</title>

<style>

body{
    text-align:center;
    font-family: Arial;
    background: linear-gradient(red, yellow, blue);
    color:white;
    overflow:hidden;
}

h1{
    font-size:70px;
    animation: zoom 2s infinite alternate;
}

@keyframes zoom{
    from{transform:scale(1)}
    to{transform:scale(1.1)}
}

#countdown{
    font-size:40px;
    margin-top:20px;
}

.balloon{
    position:absolute;
    bottom:-100px;
    width:60px;
    animation: float 10s infinite;
}

@keyframes float{
    from{bottom:-100px}
    to{bottom:100%}
}

.character{
    position:absolute;
    width:150px;
    animation: appear 6s infinite;
}

@keyframes appear{
    0%{opacity:0; transform:translateX(-200px)}
    50%{opacity:1; transform:translateX(200px)}
    100%{opacity:0; transform:translateX(600px)}
}

</style>

</head>

<body>

<h1>🎤 EMMA CUMPLE 2 🎤</h1>

<p>Te invitamos a celebrar con nosotros</p>

<p>
📅 11 Abril 2026<br>
⏰ 15:30<br>
📍 Cerro Lila 6200 Casa 13 Peñalolén
</p>

<div id="countdown"></div>


<!-- MUSICA -->
<audio autoplay loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>


<!-- GLOBOS -->

<img class="balloon" style="left:10%" src="https://i.imgur.com/7Qp7R.png">
<img class="balloon" style="left:40%" src="https://i.imgur.com/7Qp7R.png">
<img class="balloon" style="left:70%" src="https://i.imgur.com/7Qp7R.png">


<!-- PERSONAJES SING -->

<img class="character" style="top:50%" 
src="https://upload.wikimedia.org/wikipedia/en/8/8e/Buster_Moon.png">

<img class="character" style="top:20%" 
src="https://upload.wikimedia.org/wikipedia/en/3/3d/Mike_Sing.png">

<img class="character" style="top:70%" 
src="https://upload.wikimedia.org/wikipedia/en/7/7f/Ash_Sing.png">


<script>

var countDownDate = new Date("Apr 11, 2026 15:30:00").getTime();

var x = setInterval(function() {

var now = new Date().getTime();

var distance = countDownDate - now;

var days = Math.floor(distance / (1000 * 60 * 60 * 24));

var hours = Math.floor((distance % (1000*60*60*24)) / (1000*60*60));

var minutes = Math.floor((distance % (1000*60*60)) / (1000*60));

document.getElementById("countdown").innerHTML =
"Faltan " + days + " días " + hours + " horas " + minutes + " min";

}, 1000);

</script>

</body>
</html>
